name: Deploy to GoDaddy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (CI check)
        run: npm ci

      - name: Run smoke test
        run: npm run test:smoke

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add host key (known_hosts)
        run: |
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Sync project files to VPS
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude ".env" \
            --exclude "generated-pdfs/" \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/"

      - name: Install deps and restart app on VPS
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e
          cd "${{ secrets.VPS_DEPLOY_PATH }}"

          npm ci --omit=dev
          mkdir -p generated-pdfs

          if [ -n "${{ secrets.VPS_SERVICE_NAME }}" ]; then
            sudo systemctl restart "${{ secrets.VPS_SERVICE_NAME }}"
            sudo systemctl is-active "${{ secrets.VPS_SERVICE_NAME }}"
          else
            echo "VPS_SERVICE_NAME not set. Files are deployed, but service restart was skipped."
            echo "Restart manually (example): sudo systemctl restart mom-app"
          fi
          EOF
